name: Build Executables

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Build all platforms'
        required: false
        default: 'true'
        type: boolean

env:
  APP_NAME: Harmony
  APP_VERSION: 1.0.0

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libpulse0 \
            libxcb1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libfuse2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          chmod +x build.sh build.py
          python build.py linux

      - name: Create AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          # Create AppDir
          mkdir -p dist/Harmony.AppDir/usr/bin
          mkdir -p dist/Harmony.AppDir/usr/share/applications
          mkdir -p dist/Harmony.AppDir/usr/share/icons/hicolor/256x256/apps

          cp dist/Harmony dist/Harmony.AppDir/usr/bin/

          # Create desktop file
          cat > dist/Harmony.AppDir/usr/share/applications/Harmony.desktop << EOF
          [Desktop Entry]
          Name=Harmony
          Comment=Modern Music Player
          Exec=Harmony
          Icon=Harmony
          Terminal=false
          Type=Application
          Categories=AudioVideo;Audio;Player;Qt;
          EOF

          ln -sf usr/share/applications/Harmony.desktop dist/Harmony.AppDir/Harmony.desktop
          ln -sf usr/share/icons/hicolor/256x256/apps/Harmony.png dist/Harmony.AppDir/Harmony.png 2>/dev/null || true

          # Create AppRun
          cat > dist/Harmony.AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/Harmony" "$@"
          EOF
          chmod +x dist/Harmony.AppDir/AppRun

          # Build AppImage
          ARCH=x86_64 /tmp/appimagetool dist/Harmony.AppDir dist/Harmony-${{ env.APP_VERSION }}-x86_64.AppImage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-linux
          path: |
            dist/Harmony
            dist/Harmony-${{ env.APP_VERSION }}-x86_64.AppImage
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          chmod +x build.sh build.py build_macos.sh
          python build.py macos

      - name: Create DMG
        run: |
          # Create app bundle if needed
          if [ ! -d "dist/Harmony.app" ]; then
            mkdir -p dist/Harmony.app/Contents/MacOS
            mkdir -p dist/Harmony.app/Contents/Resources
            cp dist/Harmony dist/Harmony.app/Contents/MacOS/

            # Create Info.plist
            cat > dist/Harmony.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Harmony</string>
              <key>CFBundleIdentifier</key>
              <string>com.harmonyplayer.harmony</string>
              <key>CFBundleName</key>
              <string>Harmony</string>
              <key>CFBundleVersion</key>
              <string>${{ env.APP_VERSION }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ env.APP_VERSION }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.14</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          fi

          # Create DMG
          hdiutil create -volname "Harmony" -srcfolder dist/Harmony.app -ov -format UDZO dist/Harmony-${{ env.APP_VERSION }}.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-macos
          path: |
            dist/Harmony.app
            dist/Harmony-${{ env.APP_VERSION }}.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          python build.py windows

      - name: Create portable ZIP
        run: |
          mkdir -p dist/Harmony-portable
          cp dist/Harmony.exe dist/Harmony-portable/
          cp -r translations dist/Harmony-portable/ 2>$null || true

          # Create README
          Set-Content -Path "dist/Harmony-portable/README.txt" -Value @"
          Harmony v${{ env.APP_VERSION }}

          This is a portable version. No installation required.
          Just run Harmony.exe

          System Requirements:
          - Windows 10 or later
          - Visual C++ Redistributable 2015-2022
          "@

          Compress-Archive -Path "dist/Harmony-portable/*" -DestinationPath "dist/Harmony-${{ env.APP_VERSION }}-portable.zip" -Force
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-windows
          path: |
            dist/Harmony.exe
            dist/Harmony-${{ env.APP_VERSION }}-portable.zip
          retention-days: 30

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.AppImage" -exec cp {} release-assets/ \;
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
          find artifacts -name "*.exe" -exec cp {} release-assets/ \;
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
